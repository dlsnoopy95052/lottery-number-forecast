<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Number (1–99)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #f093fb, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 2rem;
    }

    .number {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      margin: 1.5rem 0;
      min-height: 6rem;
      color: #4facfe;
      text-shadow: 0 0 40px rgba(79, 172, 254, 0.4);
    }

    button {
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: #fff;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.45);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Random Number</h1>
    <p class="subtitle">Integer from 1 to 99 (inclusive)</p>
    <div class="number" id="output" aria-live="polite">—</div>
    <button type="button" id="generate">Generate</button>
  </div>

  <script>
    function random1to99() {
      return Math.floor(Math.random() * 99) + 1;
    }

    const output = document.getElementById('output');
    const button = document.getElementById('generate');

    button.addEventListener('click', () => {
      output.textContent = random1to99();
    });
  </script>
</body>
</html>
